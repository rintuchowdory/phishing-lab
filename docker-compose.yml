version: "3.9"

services:
  web:
    build: .
    container_name: flask_app
    restart: always
    volumes:
      - ./logs.txt:/app/logs.txt
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
